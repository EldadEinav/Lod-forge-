<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>LOD Forge</title>

<script src="https://unpkg.com/three@0.152.2/build/three.min.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/controls/OrbitControls.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/loaders/GLTFLoader.js"></script>
<script src="https://unpkg.com/three@0.152.2/examples/js/loaders/OBJLoader.js"></script>

<style>
html,body{
margin:0;
width:100%;
height:100%;
overflow:hidden;
background:#0b0f14;
font-family:Arial,sans-serif;
}
#dropzone{
position:absolute;
top:20px;
left:20px;
z-index:10;
padding:12px 18px;
border:1px solid #00d4ff;
color:#00d4ff;
background:rgba(0,0,0,.4);
cursor:pointer;
border-radius:8px;
}
canvas{display:block;}
</style>
</head>
<body>

<div id="dropzone">Drop OBJ / GLTF / GLB</div>
<input type="file" id="fileInput" hidden>

<script>
let scene,camera,renderer,controls,currentMesh;

init();
animate();

function init(){
scene=new THREE.Scene();
scene.background=new THREE.Color(0x0b0f14);

camera=new THREE.PerspectiveCamera(60,window.innerWidth/window.innerHeight,0.1,1000);
camera.position.set(2,2,4);

renderer=new THREE.WebGLRenderer({
antialias:true,
powerPreference:"high-performance"
});
renderer.setSize(window.innerWidth,window.innerHeight);
document.body.appendChild(renderer.domElement);

controls=new THREE.OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;

const light1=new THREE.DirectionalLight(0xffffff,1);
light1.position.set(5,5,5);
scene.add(light1);

const light2=new THREE.AmbientLight(0xffffff,0.6);
scene.add(light2);

const grid=new THREE.GridHelper(10,10);
scene.add(grid);

window.addEventListener('resize',()=>{
camera.aspect=window.innerWidth/window.innerHeight;
camera.updateProjectionMatrix();
renderer.setSize(window.innerWidth,window.innerHeight);
});

document.getElementById('dropzone').onclick=()=>{
document.getElementById('fileInput').click();
};

document.getElementById('fileInput').addEventListener('change',e=>{
handleFile(e.target.files[0]);
});
}

function handleFile(file){
if(!file)return;

const reader=new FileReader();

reader.onload=function(e){
const ext=file.name.split('.').pop().toLowerCase();

if(ext==="obj"){
const loader=new THREE.OBJLoader();
const obj=loader.parse(e.target.result);

let mesh=null;
obj.traverse(c=>{
if(c.isMesh&&!mesh)mesh=c;
});

if(mesh)loadMesh(mesh);
}

if(ext==="glb"||ext==="gltf"){
const loader=new THREE.GLTFLoader();
loader.parse(e.target.result,'',gltf=>{
let mesh=null;
gltf.scene.traverse(c=>{
if(c.isMesh&&!mesh)mesh=c;
});
if(mesh)loadMesh(mesh);
});
}
};

if(file.name.endsWith('.obj')){
reader.readAsText(file);
}else{
reader.readAsArrayBuffer(file);
}
}

function loadMesh(mesh){
if(currentMesh)scene.remove(currentMesh);

mesh.geometry.computeVertexNormals();
mesh.material=new THREE.MeshStandardMaterial({
color:0x999999
});

currentMesh=mesh;
scene.add(currentMesh);
}

function animate(){
requestAnimationFrame(animate);
controls.update();
renderer.render(scene,camera);
}
</script>

</body>
</html>
